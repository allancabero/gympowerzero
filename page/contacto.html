<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Carrito | GYMPOWER</title>

    <link rel="stylesheet" href="../dist/css/bootstrap.min.css">

    <style>
        body {
            background: #0d6efd;
        }

        .card-carrito {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .producto-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">GYMPOWER</a>
    </div>
</nav>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-12 col-md-8">

            <div class="card card-carrito p-4">

                <h2 class="text-center text-primary fw-bold mb-4">
                    🛒 Tu Carrito de Compra
                </h2>

                <!-- PRODUCTOS -->
                <div id="carrito" class="producto-box mb-4"></div>

                <!-- FORMULARIO -->
                <h5 class="mb-3">📩 Datos del cliente</h5>

                <form onsubmit="enviarPedido(event)">

                    <input type="text" class="form-control mb-3" placeholder="Nombre completo" required>
                    <input type="text" class="form-control mb-3" placeholder="Número de celular" required>
                    <input type="email" class="form-control mb-3" placeholder="Correo electrónico" required>
                    <textarea class="form-control mb-3" placeholder="Mensaje (opcional)"></textarea>

                    <button type="submit" class="btn btn-success w-100">
                        Enviar pedido
                    </button>

                </form>

                <button onclick="vaciar()" class="btn btn-danger w-100 mt-3">
                    Vaciar carrito
                </button>

            </div>

        </div>

    </div>

</div>

<script>
     
    let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

    let contenedor = document.getElementById("carrito");

    function renderCarrito() {

        contenedor.innerHTML = "";

        if (carrito.length === 0) {
            contenedor.innerHTML = "<p class='text-danger'>No hay productos en el carrito</p>";
            return;
        }

        let total = 0;

        carrito.forEach((p, index) => {
            total += p.precio;

            contenedor.innerHTML += `
                <div class="border p-2 mb-2 rounded bg-white">
                    <strong>${p.nombre}</strong><br>
                    💰 S/ ${p.precio}
                </div>
            `;
        });

        contenedor.innerHTML += `
            <hr>
            <h5>Total: S/ ${total.toFixed(2)}</h5>
        `;
    }

    renderCarrito();

    function vaciar() {
        localStorage.removeItem("carrito");
        location.reload();
    }

    function enviarPedido(event) {
        event.preventDefault();
        alert("Pedido enviado correctamente 👍");
        localStorage.removeItem("carrito");
        location.reload();
    }
</script>

</body>
</html>
